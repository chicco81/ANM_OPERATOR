<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubrica ANM 2024</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; min-height: 100vh; position: relative; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; text-align: center; }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .controls { padding: 15px; background: white; border-bottom: 1px solid #e0e0e0; position: sticky; top: 0; z-index: 100; }
        .filter-select { width: 100%; padding: 12px; border: 2px solid #667eea; border-radius: 8px; font-size: 16px; margin-bottom: 10px; background: white; }
        .search-box { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; }
        .contact-list { padding: 10px; padding-bottom: 100px; }
        .contact-card { background: white; border: 1px solid #e0e0e0; border-radius: 8px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 14px; flex-shrink: 0; }
        .contact-info { flex: 1; }
        .contact-name { font-size: 16px; font-weight: 700; color: #1f2937; }
        .contact-details { color: #6b7280; font-size: 13px; margin-top: 3px; }
        .badge { padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; margin-left: auto; }
        .stats { display: flex; justify-content: space-around; padding: 15px; background: #f9fafb; border-top: 1px solid #e5e7eb; font-size: 12px; position: fixed; bottom: 80px; left: 0; right: 0; max-width: 800px; margin: 0 auto; }
        .stat { text-align: center; }
        .stat-number { font-size: 20px; font-weight: bold; color: #667eea; }
        .add-btn { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: #10b981; color: white; border: none; border-radius: 50%; font-size: 30px; cursor: pointer; box-shadow: 0 4px 12px rgba(16,185,129,0.4); z-index: 200; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 300; justify-content: center; align-items: flex-end; }
        .modal.active { display: flex; }
        .modal-content { background: white; width: 100%; max-width: 500px; border-radius: 20px 20px 0 0; padding: 25px; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-title { font-size: 20px; font-weight: bold; }
        .close-modal { font-size: 28px; cursor: pointer; color: #9ca3af; border: none; background: none; }
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; margin-bottom: 5px; font-weight: 600; color: #374151; font-size: 14px; }
        .form-input { width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 16px; }
        .form-input:focus { outline: none; border-color: #667eea; }
        .submit-btn { width: 100%; padding: 15px; background: #667eea; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .avatar-cav { background: #3b82f6; }
        .avatar-puglie { background: #8b5cf6; }
        .avatar-carlo { background: #10b981; }
        .avatar-san { background: #f59e0b; }
        .avatar-altro { background: #6b7280; }
        .badge-cav { background: #dbeafe; color: #1e40af; }
        .badge-puglie { background: #f3e8ff; color: #7c3aed; }
        .badge-carlo { background: #d1fae5; color: #059669; }
        .badge-san { background: #fef3c7; color: #d97706; }
        .badge-altro { background: #f3f4f6; color: #4b5563; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📞 Rubrica ANM 2024</h1>
            <p>Seleziona un deposito per filtrare</p>
        </div>

        <div class="controls">
            <select class="filter-select" id="depositoFilter" onchange="renderContacts()">
                <option value="all">📋 Tutti i contatti</option>
                <option value="Cavalleggeri Aosta">🔵 Cavalleggeri Aosta</option>
                <option value="Via Puglie">🟣 Via Puglie</option>
                <option value="Carlo III">🟢 Carlo III</option>
                <option value="San Giovanni">🟠 San Giovanni</option>
                <option value="Altro">⚪ Altro</option>
            </select>
            <input type="text" class="search-box" id="searchInput" placeholder="🔍 Cerca cognome, nome o telefono..." onkeyup="renderContacts()">
        </div>

        <div class="contact-list" id="contactList">
            <div style="text-align:center;padding:40px;color:#667eea;">Caricamento...</div>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-number" id="totalCount">0</div>
                <div>Totali</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="filteredCount">0</div>
                <div>Visualizzati</div>
            </div>
        </div>

        <button class="add-btn" onclick="openModal()">+</button>
    </div>

    <div class="modal" id="addModal" onclick="closeModalOutside(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 class="modal-title">➕ Nuovo Contatto</h2>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <form onsubmit="addContact(event)">
                <div class="form-group">
                    <label class="form-label">Deposito *</label>
                    <select class="form-input" id="newDeposito" required>
                        <option value="">Seleziona deposito...</option>
                        <option value="Cavalleggeri Aosta">Cavalleggeri Aosta</option>
                        <option value="Via Puglie">Via Puglie</option>
                        <option value="Carlo III">Carlo III</option>
                        <option value="San Giovanni">San Giovanni</option>
                        <option value="Altro">Altro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Cognome *</label>
                    <input type="text" class="form-input" id="newCognome" required placeholder="Inserisci cognome">
                </div>
                <div class="form-group">
                    <label class="form-label">Nome *</label>
                    <input type="text" class="form-input" id="newNome" required placeholder="Inserisci nome">
                </div>
                <div class="form-group">
                    <label class="form-label">Matricola</label>
                    <input type="text" class="form-input" id="newMatricola" placeholder="Inserisci matricola">
                </div>
                <div class="form-group">
                    <label class="form-label">Telefono</label>
                    <input type="tel" class="form-input" id="newTelefono" placeholder="Inserisci telefono">
                </div>
                <button type="submit" class="submit-btn">Salva Contatto</button>
            </form>
        </div>
    </div>

        function renderContacts() {
            var list = document.getElementById("contactList");
            var filter = document.getElementById("depositoFilter").value;
            var search = document.getElementById("searchInput").value.toLowerCase();
            var html = "";
            var count = 0;

            for (var i = 0; i < contacts.length; i++) {
                var c = contacts[i];

                if (filter !== "all" && c.d !== filter) continue;
                if (search && c.c.toLowerCase().indexOf(search) === -1 && c.n.toLowerCase().indexOf(search) === -1 && c.t.indexOf(search) === -1) continue;

                count++;

                var avatarClass = "avatar-altro";
                var badgeClass = "badge-altro";
                if (c.d === "Cavalleggeri Aosta") { avatarClass = "avatar-cav"; badgeClass = "badge-cav"; }
                else if (c.d === "Via Puglie") { avatarClass = "avatar-puglie"; badgeClass = "badge-puglie"; }
                else if (c.d === "Carlo III") { avatarClass = "avatar-carlo"; badgeClass = "badge-carlo"; }
                else if (c.d === "San Giovanni") { avatarClass = "avatar-san"; badgeClass = "badge-san"; }

                var initials = c.c.charAt(0) + c.n.charAt(0);
                var phone = c.t || "N/A";

                html += '<div class="contact-card"><div class="avatar ' + avatarClass + '">' + initials + '</div><div class="contact-info"><div class="contact-name">' + c.c + ' ' + c.n + '</div><div class="contact-details">Matr. ' + c.m + ' • ' + phone + '</div></div><span class="badge ' + badgeClass + '">' + c.d + '</span></div>';
            }

            list.innerHTML = html || '<div style="text-align:center;padding:40px;color:#6b7280;">Nessun contatto trovato</div>';
            document.getElementById("totalCount").textContent = contacts.length;
            document.getElementById("filteredCount").textContent = count;
        }

        function openModal() {
            document.getElementById("addModal").classList.add("active");
        }

        function closeModal() {
            document.getElementById("addModal").classList.remove("active");
        }

        function closeModalOutside(e) {
            if (e.target === document.getElementById("addModal")) closeModal();
        }

        function addContact(e) {
            e.preventDefault();
            var newContact = {
                d: document.getElementById("newDeposito").value,
                c: document.getElementById("newCognome").value,
                n: document.getElementById("newNome").value,
                m: document.getElementById("newMatricola").value,
                t: document.getElementById("newTelefono").value
            };
            contacts.push(newContact);
            contacts.sort(function(a, b) { return a.c.localeCompare(b.c); });
            closeModal();
            renderContacts();
            e.target.reset();
            alert("Contatto aggiunto!");
        }

        // Avvia immediatamente
        renderContacts();
