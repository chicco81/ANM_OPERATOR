<!-- Service Worker per offline -->
<script>
if('serviceWorker' in navigator){
  const swCode = `
    const CACHE = 'anm-operator-v1';
    self.addEventListener('install', e => { self.skipWaiting(); });
    self.addEventListener('activate', e => { e.waitUntil(clients.claim()); });
    self.addEventListener('fetch', e => {
      if(e.request.url.includes('fonts.googleapis') || e.request.url.includes('fonts.gstatic') || e.request.url.includes('cdnjs') || e.request.url.includes('unpkg')) {
        e.respondWith(
          caches.open(CACHE).then(cache =>
            cache.match(e.request).then(cached =>
              cached || fetch(e.request).then(res => { cache.put(e.request, res.clone()); return res; })
            )
          )
        );
      }
    });
  `;
  const swBlob = new Blob([swCode], {type:'application/javascript'});
  const swURL = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swURL).catch(()=>{});
}
</script>

function isAdmin(m){return String(m).trim()===ADMIN_MAT;}
function getTipo(m){const n=parseInt(m)||0;return n>=14000&&n<=25000?"ANM":n>=50000&&n<=55000?"INT":"";}
async function sha256(s){const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,"0")).join("");}
function getAccounts(){try{const s=localStorage.getItem("anm_accounts");if(s)return JSON.parse(s);}catch(e){}return{};}
function setAccounts(a){try{localStorage.setItem("anm_accounts",JSON.stringify(a));}catch(e){}}
function getSession(){try{return localStorage.getItem("anm_sess")||null;}catch(e){return null;}}
function setSession(m){try{if(m)localStorage.setItem("anm_sess",m);else localStorage.removeItem("anm_sess");}catch(e){}}

function saveUserData(mat,data){try{localStorage.setItem("anm_data_"+mat,JSON.stringify(data));}catch(e){}}

// Festività
function getEaster(y){const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*m+114)/31),dy=((h+l-7*m+114)%31)+1;return{month:mo-1,day:dy};}
function getFestivita(y){const e=getEaster(y),r={};[[0,1,"Capodanno"],[0,6,"Epifania"],[3,25,"25 Aprile"],[4,1,"1 Maggio"],[5,2,"2 Giugno"],[7,15,"Ferragosto"],[10,1,"Ognissanti"],[11,8,"Immacolata"],[11,25,"Natale"],[11,26,"S.Stefano"]].forEach(([m,d,n])=>{r[dk(y,m,d)]=n;});const dk2=(y,m,d)=>`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;r[dk2(y,e.month,e.day)]="Pasqua";const pm=new Date(y,e.month,e.day+1);r[dk2(pm.getFullYear(),pm.getMonth(),pm.getDate())]="Pasquetta";return r;}

// Replica fedele del logo ufficiale ANM Napoli: fondo blu navy, "anm" arancione
function ANMLogo({ size = 36 }) {
  // Proporzioni originali logo ANM: circa 2.4:1 (larghezza:altezza)
  const w = Math.round(size * 2.2);
  const h = size;
  return (
    <svg width={w} height={h} viewBox="0 0 88 36" xmlns="http://www.w3.org/2000/svg">
      {/* Sfondo blu navy con angoli arrotondati */}
      <rect width="88" height="36" rx="5" fill="#1a1f8c"/>
      {/* Lettere "anm" minuscole in arancione/giallo ANM */}
      <text
        x="44"
        y="27"
        textAnchor="middle"
        fontFamily="Arial, Helvetica, sans-serif"
        fontWeight="bold"
        fontSize="26"
        fill="#f5a623"
        letterSpacing="1"
      >anm</text>
    </svg>
  );
}

.fg{margin-bottom:12px}

@keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}

// ── TOAST HOOK ─────────────────────────────────────────────────────────────
function useToast() {
  const [t,setT] = useState({msg:"",show:false});
  const ref = useRef();
  const fire = useCallback(msg => {
    setT({msg,show:true});
    clearTimeout(ref.current);
    ref.current = setTimeout(()=>setT(p=>({...p,show:false})),2400);
  },[]);
  return [t,fire];
}

  const _smin=_sm.length===2?_sm[0]*60+_sm[1]:-1;
  const fascia=_smin>=240&&_smin<=960?"🌅 Mattina":_smin>=0?"🌙 Sera":null;
  return (
    <div className={`dpanel${dd?"":" hidden"}`} style={{borderTop:s?`3px solid ${s.color}`:"3px solid #333"}}>
      <div className="dpanel-hero" style={{background:s?`linear-gradient(135deg,${s.color}40,${s.color}15)`:"rgba(255,255,255,.03)"}}>

        {s?.linea&&<div className="dpanel-row"><span className="dpanel-row-ic">🚌</span><div className="dpanel-row-content"><div className="dpanel-row-label">Linea</div><div className="dpanel-row-value" style={{color:s.color}}>{s.linea}</div></div></div>}
        {s&&<div className="vettura-section">

// ── APP PRINCIPALE ────────────────────────────────────────────────────────────

  function esportaBackup(){

      navigator.share({files:[new File([blob],nome,{type:"application/json"})],title:"Backup"}).then(()=>fire("✓ Condiviso!")).catch(()=>_dl(url,nome));
    }else _dl(url,nome);
  }
  function _dl(url,nome){const a=document.createElement("a");a.href=url;a.download=nome;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);fire("✓ Backup: "+nome);}
  function importaBackup(e){const f=e.target.files[0];if(!f)return;e.target.value="";const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(!d.shifts)throw new Error("File non valido");setSt(d);fire("✓ "+Object.keys(d.shifts).length+" turni ripristinati!");}catch(ex){fire("❌ "+ex.message);}};r.readAsText(f);}
  const [dayDetail,setDayDetail]   = useState(null);
  const [vetture,setVetture]       = useState([]);
  const [vetturaInput,setVetturaInput] = useState("");
  const [saeCodes,setSaeCodes]     = useState([]);
  const [saeInput,setSaeInput]     = useState("");
  const [guasti,setGuasti]         = useState({});
  const [guastoOpen,setGuastoOpen] = useState(null);
  const [guastoInput,setGuastoInput] = useState("");
  const [guastiImportOpen,setGuastiImportOpen] = useState(false);
  const [dinoOpen,setDinoOpen] = useState(false);
  const [dinoText,setDinoText] = useState("");
  const [dinoPreview,setDinoPreview] = useState(null);
  const [guastiImportText,setGuastiImportText] = useState("");
  const [guastiImportPreview,setGuastiImportPreview] = useState([]);
  const [cambioGiorno,setCambioGiorno] = useState(`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`);
  const [esportaDal,setEsportaDal] = useState(`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-01`);
  const [esportaAl,setEsportaAl]   = useState(`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(daysIn(today.getFullYear(),today.getMonth())).padStart(2,"0")}`);
  const [deferredPrompt,setDeferredPrompt] = useState(null);
  const [showInstall,setShowInstall] = useState(false);
  const [isInstalled,setIsInstalled] = useState(false);

  useEffect(()=>{
    if(window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
      setIsInstalled(true);
    }
    const handler = e => { e.preventDefault(); setDeferredPrompt(e); setShowInstall(true); };
    window.addEventListener('beforeinstallprompt', handler);
    return ()=>window.removeEventListener('beforeinstallprompt', handler);
  },[]);

  useEffect(()=>{if(utente)saveUserData(utente,st);},[st,utente]);

  const allShifts = useMemo(()=>[...PRESET_SHIFTS,...st.custom],[st.custom]);
  const festivita  = useMemo(()=>getFestivita(yr),[yr]);
  const updateSt   = useCallback((fn)=>setSt(p=>typeof fn==='function'?fn(p):fn),[]);

  function installPWA(){
    if(deferredPrompt){
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(()=>{ setDeferredPrompt(null); setShowInstall(false); });
    }
  }

  function chMonth(d){ setMo(m=>{ let n=m+d; if(n>11){setYr(y=>y+1);return 0;} if(n<0){setYr(y=>y-1);return 11;} return n; }); resetRange(); }
  function resetRange(){ setRangeA(null);setRangeB(null);setHoverD(null);setStripOpen(false);setNoteVal("");setDayDetail(null); }

  function tapDay(d){
    if(stripOpen&&rangeA!==null&&d!==rangeA){ setRangeA(Math.min(rangeA,d));setRangeB(Math.max(rangeA,d));return; }
    const key=dk(yr,mo,d),data=st.shifts[key],shift=data?allShifts.find(s=>s.id===data.shiftId):null;
    setDayDetail({d,shift,data,key});
    setVetture(data?.note?(data.note.match(/Vettura:\s*([\w]+)/g)||[]).map(v=>v.replace(/Vettura:\s*/,"")):[]);
    setVetturaInput("");
    setSaeCodes(data?.note?(data.note.match(/SAE:\s*([\w]+)/g)||[]).map(s=>s.replace(/SAE:\s*/,"")):[]);
    setSaeInput("");
    setGuasti(data?.note?parseGuasti(data.note):{});
    setGuastoOpen(null);setGuastoInput("");
    setRangeA(d);setRangeB(null);setNoteVal("");setStripOpen(false);
  }

  function openStripFromDetail(){ setDayDetail(null);setStripOpen(true); }

  function applyToRange(shiftId){
    if(!shiftId||!rangeA) return;
    const a=rangeA,b=rangeB??rangeA,ns2={...st.shifts};
    for(let d=a;d<=b;d++) ns2[dk(yr,mo,d)]={shiftId,note:noteVal||(ns2[dk(yr,mo,d)]?.note||"")};
    setSt(p=>({...p,shifts:ns2}));
    fire(`✓ ${b-a+1} giorn${b-a===0?"o":"i"} aggiornati`);
    resetRange();
  }

  function applyManuale(){
    const f=manualeForm;
    if(!f.label.trim()){fire("Inserisci almeno il nome turno");return;}
    const customId="man_"+Date.now();
    const newShift={id:customId,label:f.label.trim(),icon:f.icon||"🚌",color:f.color||"#FF6B35",start:f.start,end:f.end};
    const a=rangeA,b=rangeB??rangeA,ns2={...st.shifts};
    for(let d=a;d<=b;d++) ns2[dk(yr,mo,d)]={shiftId:customId,note:noteVal||(ns2[dk(yr,mo,d)]?.note||"")};
    setSt(p=>({...p,shifts:ns2,custom:[...p.custom,newShift]}));
    fire("✓ Turno manuale applicato!");
    setShowManuale(false);
    setManualeForm({label:"",icon:"🚌",color:"#FF6B35",start:"",end:""});
    resetRange();
  }

  function clearRange(){
    if(!rangeA) return;
    const a=rangeA,b=rangeB??rangeA,ns2={...st.shifts};
    for(let d=a;d<=b;d++) delete ns2[dk(yr,mo,d)];
    setSt(p=>({...p,shifts:ns2}));fire("Turni rimossi");resetRange();
  }

  function applyRotation(){
    if(!st.rotPat.length||!rotStart) return;
    const start=new Date(rotStart+"T00:00:00");
    const days=rotRepeat==="forever"?730:rotRepeat==="year"?365:rotRepeat==="6months"?180:90;
    const ns2={...st.shifts};
    for(let i=0;i<days;i++){
      const d=new Date(start);d.setDate(d.getDate()+i);
      const key=dk(d.getFullYear(),d.getMonth(),d.getDate());
      ns2[key]={shiftId:st.rotPat[i%st.rotPat.length],note:ns2[key]?.note||""};
    }
    setSt(p=>({...p,shifts:ns2}));
    fire(`✓ Rotazione applicata (${days} giorni)`);
    setTimeout(()=>setTab("cal"),700);
  }

  const stats=useMemo(()=>{
    const pfx=`${yr}-${String(mo+1).padStart(2,"0")}`;
    let totalH=0,overtime=0,cnt={};
    Object.entries(st.shifts).forEach(([key,val])=>{
      if(!key.startsWith(pfx)) return;
      const s=allShifts.find(x=>x.id===val.shiftId);if(!s) return;
      cnt[s.label]=(cnt[s.label]||0)+1;
      const h=calcH(s.start,s.end);totalH+=h;if(h>8) overtime+=h-8;
    });
    return {totalH:totalH.toFixed(1),overtime:overtime.toFixed(1),cnt,tot:Object.values(cnt).reduce((a,b)=>a+b,0)};
  },[st.shifts,mo,yr,allShifts]);

  const guastiMese=useMemo(()=>{
    const pfx=`${yr}-${String(mo+1).padStart(2,"0")}`,lista=[];
    Object.entries(st.shifts).forEach(([key,val])=>{
      if(!key.startsWith(pfx)||!val.note) return;
      const re=/Guasto\[([\w]+)\]:\s*([^|\n]+)/g;let m;
      while((m=re.exec(val.note))!==null){
        const d=parseInt(key.split("-")[2]),dow=DAYS[(fdow(yr,mo)+d-1)%7];
        lista.push({key,d,dow,vettura:m[1],guasto:m[2].trim()});
      }
    });
    return lista.sort((a,b)=>a.d-b.d);
  },[st.shifts,mo,yr]);

  const cambioPrev=useMemo(()=>{
    const d=new Date(cambioGiorno);if(isNaN(d)) return null;
    const key=dk(d.getFullYear(),d.getMonth(),d.getDate()),data=st.shifts[key];
    if(!data) return {vuoto:true};
    const sh=allShifts.find(x=>x.id===data.shiftId);if(!sh) return null;
    const vets=(data.note||"").match(/Vettura:\s*([\w]+)/g)||[];
    const saes=(data.note||"").match(/SAE:\s*([\w]+)/g)||[];
    return {sh,vets:vets.map(v=>v.replace(/Vettura:\s*/,"")),saes:saes.map(s=>s.replace(/SAE:\s*/,""))};
  },[cambioGiorno,st.shifts,allShifts]);

  function dayClass(d){
    let c="day";
    const isToday=d===today.getDate()&&mo===today.getMonth()&&yr===today.getFullYear();
    if(isToday) c+=" is-today";
    if(!rangeA) return c;
    const eff=hoverD??rangeB;
    if(!eff){if(d===rangeA) c+=" range-start";return c;}
    const a=Math.min(rangeA,eff),b=Math.max(rangeA,eff);
    if(d===a||d===b) c+=" range-start";
    else if(d>a&&d<b) c+=" in-range";
    return c;
  }

  function rangeLabel(){
    if(!rangeA) return "👆 Tocca un giorno per assegnare un turno";
    if(!rangeB) return `📅 ${rangeA} ${MONTHS[mo]} — tocca un altro giorno per estendere`;
    return `✅ Dal ${rangeA} al ${rangeB} · ${rangeB-rangeA+1} giorni → tocca il turno ↓`;
  }

  function saveNewShift(){
    if(!ns.label.trim()){fire("Dai un nome al turno!");return;}
    setSt(p=>({...p,custom:[...p.custom,{...ns,icon:ns.icon||"⚡",id:`c_${Date.now()}`}]}));
    setNs({label:"",icon:"⚡",color:"#6366F1",start:"08:00",end:"16:00"});
    setModal(false);fire("✓ Turno creato!");
  }

  function copyToClipboard(text){
    try{
      if(navigator.clipboard&&window.isSecureContext){
        navigator.clipboard.writeText(text).then(()=>fire("✓ Copiato negli appunti!")).catch(()=>legacyCopy(text));
      } else legacyCopy(text);
    }catch(e){legacyCopy(text);}
  }
  function legacyCopy(text){
    const ta=document.createElement("textarea");ta.value=text;ta.style.cssText="position:fixed;opacity:0;top:0;left:0";
    document.body.appendChild(ta);ta.focus();ta.select();
    try{document.execCommand("copy");fire("✓ Copiato negli appunti!");}catch(e){fire("Copia manuale necessaria");}
    document.body.removeChild(ta);
  }
  function shareText(title,text){
    if(navigator.share&&navigator.canShare&&navigator.canShare({title,text})){
      navigator.share({title,text}).then(()=>fire("✓ Condiviso!")).catch(err=>{if(err.name!=="AbortError") copyToClipboard(text);});
    } else copyToClipboard(text);
  }

  function shareMonth(){
    const lines=[`📅 Turni ${MONTHS[mo]} ${yr}\n`];
    for(let d=1;d<=daysIn(yr,mo);d++){
      const key=dk(yr,mo,d),data=st.shifts[key];if(!data) continue;
      const s=allShifts.find(x=>x.id===data.shiftId);if(!s) continue;
      const dow=DAYS[(fdow(yr,mo)+d-1)%7];
      lines.push(`${d} ${MONTHS[mo].slice(0,3)} (${dow}): ${s.icon} ${s.label}${s.start?" "+s.start+"–"+s.end:""}${data.note?" · "+data.note:""}`);
    }
    shareText(`Turni ${MONTHS[mo]} ${yr}`,lines.join("\n"));
  }

  function shareQuindicinale(){
    const dal=new Date(esportaDal),al=new Date(esportaAl);
    if(isNaN(dal)||isNaN(al)||dal>al){fire("Controlla le date");return;}
    const lines2=[`📋 QUINDICINALE ${esportaDal.replace(/-/g,"/")} → ${esportaAl.replace(/-/g,"/")}\n`];
    const cur=new Date(dal);
    while(cur<=al){
      const y2=cur.getFullYear(),m2=cur.getMonth(),d2=cur.getDate();
      const key=dk(y2,m2,d2),data=st.shifts[key];
      if(data){
        const sh=allShifts.find(x=>x.id===data.shiftId);
        if(sh){
          const dow=DAYS[(new Date(y2,m2,d2).getDay()+6)%7];
          let row=`${String(d2).padStart(2,"0")}/${String(m2+1).padStart(2,"0")} ${dow}  ${sh.icon} ${sh.label}`;
          if(sh.start) row+=`  ${sh.start}-${sh.end}`;
          if(sh.linea) row+=`  ${sh.linea}`;
          const vets=(data.note||"").match(/Vettura:\s*([\w]+)/g)||[];
          if(vets.length) row+=`  Vet:${vets.map(v=>v.replace(/Vettura:\s*/,"")).join(", ")}`;
          lines2.push(row);
        }
      }
      cur.setDate(cur.getDate()+1);
    }
    if(lines2.length===1){fire("Nessun turno nel periodo");return;}
    shareText("Quindicinale",lines2.join("\n"));
  }

  function shareTurnoSingolo(){
    const d=new Date(cambioGiorno);if(isNaN(d)){fire("Seleziona un giorno valido");return;}
    const key=dk(d.getFullYear(),d.getMonth(),d.getDate()),data=st.shifts[key];
    if(!data){fire("Nessun turno per questo giorno");return;}
    const sh=allShifts.find(x=>x.id===data.shiftId);if(!sh){fire("Turno non trovato");return;}
    const DAYS_IT=["Domenica","Lunedì","Martedì","Mercoledì","Giovedì","Venerdì","Sabato"];
    const MESI_IT=["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
    const dataStr=`${DAYS_IT[d.getDay()]} ${d.getDate()} ${MESI_IT[d.getMonth()]} ${d.getFullYear()}`;

  function calcEndTime(pres,durata){
    try{const [ph,pm]=pres.split(":").map(Number),[dh,dm]=durata.split(":").map(Number),tot=(ph*60+pm)+(dh*60+dm);return `${String(Math.floor(tot/60)%24).padStart(2,"0")}:${String(tot%60).padStart(2,"0")}`;}catch(e){return "";}
  }

  function parseANMItems(items){
    const dateRe=/^(\d{2})\/(\d{2})\/(\d{4})$/,timeRe=/^\d{2}:\d{2}$/;
    const SKIP=new Set(["Interi","0","Lun","Mar","Mer","Gio","Ven","Sab","Dom","Dep","Linea","PGM"]);
    return items.filter(it=>it.x>=40&&it.x<=115&&dateRe.test(it.str)&&it.y>50&&it.y<720).map(anchor=>{
      const dm=anchor.str.match(dateRe),day=parseInt(dm[1]),month=parseInt(dm[2])-1,year=parseInt(dm[3]);
      const row=items.filter(it=>Math.abs(it.y-anchor.y)<=3.5),rowStr=row.map(i=>i.str).join(" ");
      let tipo="servizio";
      if(/RIPOSO/i.test(rowStr)) tipo="riposo";
      else if(/spezzato\s+apertura/i.test(rowStr)) tipo="spezzato_ap";
      else if(/spezzato\s+chiusura/i.test(rowStr)) tipo="spezzato_ch";
      else if(/DISP/i.test(rowStr)&&/SERALE/i.test(rowStr)) tipo="disp_serale";
      if(tipo!=="servizio") return {day,month,year,tipo,linea:"",uscita:"",pres:"",fine:"",loc:""};
      const get=(x0,x1,test)=>(row.find(it=>it.x>=x0&&it.x<=x1&&(!test||test(it.str)))||{str:""}).str;
      const uscita=get(110,155,t=>timeRe.test(t)),linea=get(155,215,t=>!timeRe.test(t)&&!SKIP.has(t)&&!dateRe.test(t)&&t.length>=2);
      const loc=get(195,250,t=>!timeRe.test(t)&&!SKIP.has(t)&&!dateRe.test(t)&&t.length>=3);
      const pres=get(245,285,t=>timeRe.test(t)),durata=get(345,390,t=>timeRe.test(t));
      return {day,month,year,tipo,linea,uscita,pres,fine:(pres&&durata)?calcEndTime(pres,durata):"",loc};
    });
  }

  function loadPdfJs(){
    return new Promise((resolve,reject)=>{
      if(window.pdfjsLib){resolve(window.pdfjsLib);return;}
      const script=document.createElement("script");
      script.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
      script.onload=()=>{window.pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";resolve(window.pdfjsLib);};
      script.onerror=()=>reject(new Error("Impossibile caricare pdf.js"));
      document.head.appendChild(script);
    });
  }

  async function handleImportFile(e){
    const file=e.target.files[0];if(!file) return;
    e.target.value="";fire("Lettura PDF in corso…");
    try{
      const pdfjs=await loadPdfJs(),arrayBuf=await file.arrayBuffer();
      const pdf=await pdfjs.getDocument({data:new Uint8Array(arrayBuf)}).promise,allItems=[];
      for(let p=1;p<=pdf.numPages;p++){
        const page=await pdf.getPage(p),vp=page.getViewport({scale:1}),content=await page.getTextContent();
        content.items.forEach(item=>{const str=item.str.trim();if(!str) return;allItems.push({x:Math.round(item.transform[4]*10)/10,y:Math.round((vp.height-item.transform[5])*10)/10,str});});
      }
      const rows=parseANMItems(allItems);
      if(rows.length===0){fire("Nessun turno trovato nel PDF");return;}
      setImportData(rows);fire("Trovati "+rows.length+" giorni - controlla anteprima");
    }catch(err){fire("Errore: "+err.message);}
  }

  function parseDinoBot(){
    const txt = dinoText.trim();
    if(!txt){ fire("Incolla il messaggio del bot!"); return; }
    const headerMatch = txt.match(/([A-ZÀÈÌÒÙ]+),\s*per il giorno\s*(\d{2})\/(\d{2})\/(\d{4})/i);
    if(!headerMatch){ fire("Formato non riconosciuto — copia tutto il messaggio"); return; }
    const nome = headerMatch[1];
    const day = parseInt(headerMatch[2]);
    const month = parseInt(headerMatch[3]) - 1;
    const year = parseInt(headerMatch[4]);
    const turnoMatch = txt.match(/Turno\s+([\d\-]+[A-Z]*)/i);
    const turno = turnoMatch ? turnoMatch[1] : "";
    const montoRe = /monto\s+[^a]+alle\s+(\d{2}:\d{2})/gi;
    const smontoRe = /smonto\s+[^a]+alle\s+(\d{2}:\d{2})/gi;
    const monti=[], smonti=[];
    let m;
    while((m=montoRe.exec(txt))!==null) monti.push(m[1]);
    while((m=smontoRe.exec(txt))!==null) smonti.push(m[1]);
    const start = monti[0] || "";
    const end = smonti[smonti.length-1] || "";
    const depMatch = txt.match(/monto\s+([A-Z][^a]+?)\s+alle\s+\d/i);
    const deposito = depMatch ? depMatch[1].trim() : "";
    const nastroPart = txt.split("nastro")[1] || "";
    const nastroCodes = [...new Set((nastroPart.match(/^(\d{4,6})\s/gm)||[]).map(x=>x.trim()))];
    const linea = turno || nastroCodes[0] || "";
    const pezziMatch = txt.match(/Pezzo\s+\d/gi);
    const pezzi = pezziMatch ? pezziMatch.length : 1;
    let icon="🌅", color="#F59E0B";
    if(start){
      const [h]=start.split(":").map(Number);
      if(h>=14&&h<22){icon="☀️";color="#3B82F6";}
      else if(h>=22||h<5){icon="🌙";color="#8B5CF6";}
    }
    const preview = {nome,day,month,year,turno,start,end,deposito,linea,pezzi,icon,color,nastroCodes};
    setDinoPreview(preview);
    fire(`✓ Trovato turno ${turno} del ${day}/${month+1}/${year}`);
  }

  function parseGuastiImport(){
    const lines2=guastiImportText.split("\n"),found=[];
    let currentDate=null,currentVettura=null;
    const mMap={gen:0,feb:1,mar:2,apr:3,mag:4,giu:5,lug:6,ago:7,set:8,ott:9,nov:10,dic:11};
    for(const line of lines2){
      const l=line.trim();if(!l) continue;
      const dateMatch=l.match(/(\d{1,2})\s+([A-Za-z]{3})/);
      if(dateMatch&&!l.startsWith("⚠️ REGISTRO")){
        currentDate={day:parseInt(dateMatch[1]),month:mMap[dateMatch[2].toLowerCase().substring(0,3)]??mo,year:yr};
        currentVettura=null;continue;
      }
      const vetMatch=l.match(/(?:Vettura\s+)?([\w]{2,10})$/i);
      if((l.includes("🚍")||l.toLowerCase().includes("vettura"))&&vetMatch){currentVettura=vetMatch[1].toUpperCase();continue;}
      if(currentDate&&currentVettura&&!l.startsWith("📅")&&!l.startsWith("📱")){
        const desc=l.replace(/^⚠️\s*/,"").trim();
        if(desc.length>=4){found.push({...currentDate,vettura:currentVettura,guasto:desc});currentVettura=null;}

  }

// ─── PIN SCREEN ──────────────────────────────────────────────────────────────
function PinScreen({onUnlock}){
  const [v,setV]=useState(""); const [err,setErr]=useState(false);
  const pin=()=>{try{return localStorage.getItem("anm_pin")||"";}catch(e){return "";}};
  function tap(n){
    if(v.length>=4)return;
    const nx=v+n; setV(nx);
    if(nx.length===4) setTimeout(()=>{if(nx===pin()){onUnlock();}else{setErr(true);setV("");setTimeout(()=>setErr(false),600);}},150);
  }
  return (
    <div className="pin-screen">
      <div style={{fontSize:42}}>🔒</div>
      <div style={{fontSize:15,fontWeight:700,color:"#E2E2F0"}}>Inserisci PIN</div>
      <div className="pin-dots">{[0,1,2,3].map(i=><div key={i} className={`pin-dot${i<v.length?" on":""}`} style={err?{borderColor:"#EF4444",background:i<v.length?"#EF4444":"transparent"}:{}}/>)}</div>
      {err&&<div style={{fontSize:12,color:"#EF4444",fontWeight:700}}>PIN errato</div>}
      <div className="pin-pad">
        {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((k,i)=>(
          k===""?<div key={i}/>:k==="⌫"?<button key={i} className="pin-btn" style={{background:"none",border:"none",fontSize:20}} onClick={()=>setV(p=>p.slice(0,-1))}>{k}</button>:
          <button key={i} className="pin-btn" onClick={()=>tap(String(k))}>{k}</button>
        ))}
      </div>
    </div>
  );
}

// ─── CAMBIO PASSWORD ─────────────────────────────────────────────────────────
function ChangePwd({utente,fire}){
  const [open,setOpen]=useState(false);
  const [o,setO]=useState(""); const [n1,setN1]=useState(""); const [n2,setN2]=useState("");
  const [err,setErr]=useState(""); const [ok,setOk]=useState(false);
  async function save(){
    if(!o||!n1||!n2){setErr("Compila tutti i campi");return;}
    if(n1!==n2){setErr("Password non coincidono");return;}
    if(n1.length<4){setErr("Minimo 4 caratteri");return;}
    const accs=getAccounts(),acc=accs[utente];
    if(!acc){setErr("Account non trovato");return;}
    if(await sha256(o)!==acc.pwdHash){setErr("Vecchia password errata");return;}
    accs[utente]={...acc,pwdHash:await sha256(n1)};setAccounts(accs);
    try{const s=localStorage.getItem("anm_remember");if(s){const r=JSON.parse(s);r.pwd=n1;localStorage.setItem("anm_remember",JSON.stringify(r));}}catch(e){}
    setOk(true);setErr("");setO("");setN1("");setN2("");fire("✓ Password aggiornata!");
    setTimeout(()=>{setOk(false);setOpen(false);},2000);
  }
  return (<div>
    <SRow ic="🔑" title="Cambia password" sub="Modifica la password di accesso" right={open?"∨":"›"} onClick={()=>{setOpen(p=>!p);setErr("");}}/>
    {open&&<div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",borderRadius:12,padding:"14px 16px",marginBottom:8,display:"flex",flexDirection:"column",gap:10}}>
      {[["Vecchia",o,setO],["Nuova",n1,setN1],["Conferma",n2,setN2]].map(([lbl,val,setter])=>(
        <div key={lbl}>
          <div style={{fontSize:9,color:"#555",fontWeight:700,textTransform:"uppercase",marginBottom:4}}>{lbl} password</div>
          <input type="password" value={val} onChange={e=>{setter(e.target.value);setErr("");}} style={{width:"100%",background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",borderRadius:9,padding:"10px 12px",color:"#E2E2F0",fontFamily:"'Syne',sans-serif",fontSize:14,outline:"none",boxSizing:"border-box"}}/>
        </div>
      ))}
      {err&&<div style={{fontSize:12,color:"#EF4444",fontWeight:600}}>{err}</div>}
      {ok&&<div style={{fontSize:12,color:"#10B981",fontWeight:600}}>✅ Aggiornata!</div>}
      <button onClick={save} style={{background:"linear-gradient(135deg,#FF6B35,#FF3CAC)",border:"none",color:"white",padding:"12px",borderRadius:10,cursor:"pointer",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:13}}>Salva</button>
    </div>}
  </div>);
}

  const [showAdmin,setShowAdmin]=useState(false);
  async function attivaNotif(){if(!("Notification"in window)){fire("Non supportate");return;}const p=await Notification.requestPermission();setNotif(p);fire(p==="granted"?"✓ Notifiche attivate!":"Non autorizzate");}

  function migrate(){if(!migF.trim()||!migT.trim()){setAdmMsg("❌ Inserisci entrambe le matricole");return;}const from=migF.trim(),to=migT.trim();const a=getAccounts();if(!a[from]){setAdmMsg("❌ "+from+" non trovata");return;}if(a[to]){setAdmMsg("❌ "+to+" già registrata");return;}a[to]={...a[from]};delete a[from];try{const d=localStorage.getItem("anm_data_"+from);if(d)localStorage.setItem("anm_data_"+to,d);localStorage.removeItem("anm_data_"+from);}catch(e){}setAccounts(a);setAccs({...a});setAdmMsg("✅ Migrato "+from+" → "+to);setTimeout(()=>setAdmMsg(""),6000);}
  const logs=useMemo(()=>{try{return JSON.parse(localStorage.getItem("anm_log")||"[]").slice(-20).reverse();}catch(e){return [];}});

      <div style={{width:54,height:54,borderRadius:"50%",background:"linear-gradient(135deg,#FF6B35,#FF3CAC)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:800,color:"white",flexShrink:0}}>{(acc.nome||utente).substring(0,1).toUpperCase()}</div>

    <div style={{fontSize:10,fontWeight:700,color:"#444",textTransform:"uppercase",letterSpacing:".6px",marginBottom:8}}>🔐 Account</div>
    <ChangePwd utente={utente} fire={fire}/>
    {/* PIN */}
    <SRow ic="🔒" title="Blocco PIN" sub={pin?"Attivo — blocco dopo 5 min":"Non attivo"} color={pin?"#10B981":undefined}/>
    <div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",borderRadius:12,padding:"12px 14px",marginBottom:8}}>

        <input type="password" inputMode="numeric" maxLength={4} value={newP} onChange={e=>setNewP(e.target.value.replace(/\D/g,""))} placeholder="Nuovo PIN (4 cifre)" style={{flex:1,background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.12)",borderRadius:9,padding:"9px 12px",color:"#E2E2F0",fontFamily:"'JetBrains Mono',monospace",fontSize:18,fontWeight:700,letterSpacing:4,outline:"none",textAlign:"center"}}/>
        <button onClick={salvaPin} style={{background:"rgba(16,185,129,.2)",border:"1px solid rgba(16,185,129,.4)",color:"#10B981",padding:"9px 14px",borderRadius:9,cursor:"pointer",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:13}}>Imposta</button>
        {pin&&<button onClick={rimuoviPin} style={{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.25)",color:"#EF4444",padding:"9px 10px",borderRadius:9,cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"'Syne',sans-serif"}}>✕</button>}
      </div>
      {pinMsg&&<div style={{fontSize:12,fontWeight:600,color:pinMsg.startsWith("✅")?"#10B981":"#EF4444",marginTop:8}}>{pinMsg}</div>}
    </div>
    <div style={{fontSize:10,fontWeight:700,color:"#444",textTransform:"uppercase",letterSpacing:".6px",marginBottom:8,marginTop:14}}>🎨 Aspetto</div>
    <SRow ic={darkMode?"🌙":"☀️"} title={"Tema "+(darkMode?"scuro":"chiaro")+" attivo"} sub="Tocca per cambiare"
      right={<div style={{width:44,height:24,borderRadius:12,background:darkMode?"linear-gradient(135deg,#6366F1,#8B5CF6)":"rgba(0,0,0,.15)",position:"relative",cursor:"pointer",transition:"background .2s"}} onClick={toggleTheme}><div style={{position:"absolute",width:18,height:18,borderRadius:"50%",background:"white",top:3,left:darkMode?23:3,transition:"left .2s",boxShadow:"0 1px 4px rgba(0,0,0,.3)"}}/></div>}
      onClick={toggleTheme}/>
    <div style={{fontSize:10,fontWeight:700,color:"#444",textTransform:"uppercase",letterSpacing:".6px",marginBottom:8,marginTop:14}}>🔔 Notifiche</div>
    <SRow ic="🔔" title="Notifiche push" sub={notif==="granted"?"Attive — reminder turno alle 21:00":"Non attive"} color={notif==="granted"?"#10B981":undefined}
      right={notif==="granted"?<button onClick={testNotif} style={{background:"rgba(16,185,129,.15)",border:"1px solid rgba(16,185,129,.35)",color:"#10B981",padding:"5px 10px",borderRadius:18,cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"'Syne',sans-serif"}}>🧪 Test</button>
        :<button onClick={attivaNotif} style={{background:"rgba(255,107,53,.15)",border:"1px solid rgba(255,107,53,.35)",color:"#FF6B35",padding:"5px 10px",borderRadius:18,cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"'Syne',sans-serif"}}>Attiva</button>}/>
    <div style={{fontSize:10,fontWeight:700,color:"#444",textTransform:"uppercase",letterSpacing:".6px",marginBottom:8,marginTop:14}}>💾 Backup</div>
    <input ref={backupRef} type="file" accept=".json" style={{display:"none"}} onChange={importaBackup}/>
    <SRow ic="📦" title="Esporta backup" sub="Salva turni — Drive · Telegram · File" color="#10B981" onClick={esportaBackup}/>
    <SRow ic="♻️" title="Ripristina backup" sub="Carica file .json salvato" color="#6EE7B7" onClick={()=>backupRef.current?.click()}/>
    {/* ADMIN */}
    {isAdmin(utente)&&<>
      <div style={{fontSize:10,fontWeight:700,color:"#EF4444",textTransform:"uppercase",letterSpacing:".6px",marginBottom:8,marginTop:14}}>👑 Pannello Admin</div>
      <SRow ic="👑" title="Gestione sistema" sub={Object.keys(accs).length+" account registrati"} danger right={showAdmin?"∨":"›"} onClick={()=>setShowAdmin(p=>!p)}/>
      {showAdmin&&<div style={{background:"rgba(239,68,68,.04)",border:"1px solid rgba(239,68,68,.15)",borderRadius:12,padding:"14px 16px",marginBottom:8,display:"flex",flexDirection:"column",gap:12}}>
        {/* AVVISO */}
        <div>
          <div style={{fontSize:10,color:"#FCA5A5",fontWeight:700,textTransform:"uppercase",marginBottom:6}}>📢 Avviso per tutti</div>
          <textarea value={avviso} onChange={e=>setAvviso(e.target.value)} placeholder="Scrivi un messaggio per tutti i colleghi…" rows={2} style={{width:"100%",background:"rgba(0,0,0,.2)",border:"1px solid rgba(255,107,53,.25)",borderRadius:8,padding:"9px 11px",color:"#E2E2F0",fontFamily:"'Syne',sans-serif",fontSize:13,outline:"none",resize:"none",boxSizing:"border-box"}}/>
          <div style={{display:"flex",gap:8,marginTop:6}}>
            <button onClick={salvaAvviso} style={{flex:1,background:"rgba(255,107,53,.2)",border:"1px solid rgba(255,107,53,.4)",color:"#FF6B35",padding:"8px",borderRadius:8,cursor:"pointer",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:12}}>📢 Pubblica</button>
            {avviso&&<button onClick={()=>{setAvviso("");salvaAvviso();}} style={{background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.25)",color:"#EF4444",padding:"8px 12px",borderRadius:8,cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"'Syne',sans-serif"}}>Rimuovi</button>}
          </div>
        </div>
        {/* MIGRAZIONE */}
        <div>
          <div style={{fontSize:10,color:"#FCA5A5",fontWeight:700,textTransform:"uppercase",marginBottom:6}}>🔄 Migrazione matricola</div>
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}>
            <input value={migF} onChange={e=>setMigF(e.target.value)} placeholder="Da" style={{flex:1,background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,padding:"7px 10px",color:"#E2E2F0",fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:700,outline:"none"}}/>
            <span style={{color:"#555"}}>→</span>
            <input value={migT} onChange={e=>setMigT(e.target.value)} placeholder="A" style={{flex:1,background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,padding:"7px 10px",color:"#E2E2F0",fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:700,outline:"none"}}/>
          </div>
          <button onClick={migrate} style={{width:"100%",background:"rgba(255,107,53,.15)",border:"1px solid rgba(255,107,53,.35)",color:"#FF6B35",padding:"9px",borderRadius:8,cursor:"pointer",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:12}}>🔄 Migra</button>
          {admMsg&&<div style={{fontSize:12,fontWeight:700,color:admMsg.startsWith("✅")?"#10B981":"#EF4444",marginTop:6}}>{admMsg}</div>}
        </div>
        {/* UTENTI */}
        <div>
          <div style={{fontSize:10,color:"#FCA5A5",fontWeight:700,textTransform:"uppercase",marginBottom:6}}>👥 Utenti ({Object.keys(accs).length})</div>
          <div style={{maxHeight:200,overflowY:"auto",borderRadius:8,border:"1px solid rgba(255,255,255,.06)"}}>
            {Object.entries(accs).map(([mat,a],i)=>(
              <div key={mat} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderBottom:"1px solid rgba(255,255,255,.04)"}}>
                <div style={{width:28,height:28,borderRadius:"50%",background:CLR[i%CLR.length],display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:"white",flexShrink:0}}>{ini(a.nome||mat)}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,fontWeight:700,color:mat===utente?"#FF6B35":"#E2E2F0"}}>{a.nome||"—"}{mat===utente&&<span style={{fontSize:8,color:"#FF6B35",marginLeft:4}}>TU</span>}</div>
                  <div style={{fontSize:9,color:"#555",fontFamily:"'JetBrains Mono',monospace"}}>{mat} {getTipo(mat)&&<span style={{color:getTipo(mat)==="ANM"?"#3B82F6":"#F59E0B"}}>·{getTipo(mat)}</span>}</div>
                </div>
                {mat!==utente&&<div style={{display:"flex",gap:4}}>
                  <button onClick={()=>resetPwd(mat)} style={{background:"rgba(255,107,53,.12)",border:"none",color:"#FF6B35",padding:"3px 7px",borderRadius:5,cursor:"pointer",fontSize:10,fontWeight:700}}>🔑</button>
                  <button onClick={()=>delUser(mat)} style={{background:"rgba(239,68,68,.1)",border:"none",color:"#EF4444",padding:"3px 7px",borderRadius:5,cursor:"pointer",fontSize:10,fontWeight:700}}>✕</button>
                </div>}
              </div>
            ))}
          </div>
        </div>
        {/* STORICO */}
        {logs.length>0&&<div>
          <div style={{fontSize:10,color:"#FCA5A5",fontWeight:700,textTransform:"uppercase",marginBottom:6}}>📋 Ultimi accessi</div>
          <div style={{maxHeight:150,overflowY:"auto",borderRadius:8,border:"1px solid rgba(255,255,255,.06)"}}>
            {logs.map((l,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 10px",borderBottom:"1px solid rgba(255,255,255,.04)",fontSize:10}}>
                <span style={{fontFamily:"'JetBrains Mono',monospace",color:"#FF6B35",fontWeight:700}}>{l.mat}</span>
                <span style={{color:"#444"}}>{new Date(l.ts).toLocaleString("it-IT",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})}</span>
              </div>
            ))}
          </div>
        </div>}
      </div>}
    </>}
    <div style={{fontSize:10,fontWeight:700,color:"#444",textTransform:"uppercase",letterSpacing:".6px",marginBottom:8,marginTop:14}}>ℹ️ Info</div>
    <SRow ic="📱" title="Operatore ANM Napoli" sub="v2.0 · Gestione turni" right={<span style={{fontSize:10,color:"#333",fontFamily:"'JetBrains Mono',monospace"}}>v2.0</span>}/>
    <button onClick={()=>{try{localStorage.removeItem("anm_remember");}catch(e){}onLogout();}} style={{width:"100%",background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.25)",color:"#EF4444",padding:"15px",borderRadius:12,cursor:"pointer",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:15,marginTop:16,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
      🚪 Esci dall'account
    </button>
    <div style={{fontSize:11,color:"#333",textAlign:"center",marginTop:12}}>Fatto con ❤️ per gli operatori ANM Napoli</div>
  </div>);
}

// ─── COLLEGHI TAB ─────────────────────────────────────────────────────────────
function ColleghiTab({st,updateSt,fire,cambioGiorno,setCambioGiorno,allShifts}){
  const cl=st.colleghi||[];
  const CLR=["#6366F1","#EC4899","#F59E0B","#10B981","#3B82F6","#8B5CF6","#EF4444","#14B8A6"];
  const ini=n=>n.trim().split(" ").map(w=>w[0]||"").join("").substring(0,2).toUpperCase();
  const [q,setQ]=useState(""); const [showD,setShowD]=useState(false); const [sel,setSel]=useState(null);
  const [editId,setEditId]=useState(null); const [editMat,setEditMat]=useState("");
  const sugg=q.trim().length>0?cl.filter(c=>c.nome.toLowerCase().includes(q.toLowerCase())||c.matricola.startsWith(q)).slice(0,8):[];
  function pick(c){setSel(c);setQ(c.nome);setShowD(false);}
  function clear(){setSel(null);setQ("");setShowD(false);}
  function addC(n,m){if(!n.trim()||!m.trim()){fire("Nome e matricola");return;}updateSt(p=>({...p,colleghi:[...(p.colleghi||[]),{id:Date.now(),nome:n.trim(),matricola:m.trim().toUpperCase()}]}));fire("✓ Aggiunto!");}
  function removeC(id){updateSt(p=>({...p,colleghi:(p.colleghi||[]).filter(c=>c.id!==id)}));}
  function updMat(id,m){updateSt(p=>({...p,colleghi:(p.colleghi||[]).map(c=>c.id===id?{...c,matricola:m.trim()}:c)}));fire("✓ Matricola aggiornata");setEditId(null);}
  function shareC(c){
    const d=new Date(cambioGiorno);if(isNaN(d)){fire("Data non valida");return;}
    const key=dk(d.getFullYear(),d.getMonth(),d.getDate()),data=st.shifts[key];
    if(!data){fire("Nessun turno per questo giorno");return;}
    const sh=allShifts.find(x=>x.id===data.shiftId);if(!sh)return;
    const DI=["Domenica","Lunedì","Martedì","Mercoledì","Giovedì","Venerdì","Sabato"];
    const MI=["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
    const ds=`${DI[d.getDay()]} ${d.getDate()} ${MI[d.getMonth()]} ${d.getFullYear()}`;
    const vets=(data.note||"").match(/Vettura:\s*([\w]+)/g)||[];
    const txt=["🔄 CAMBIO TURNO",`👤 ${c.nome} — Matr. ${c.matricola}`,`📅 ${ds}`,`${sh.icon} ${sh.label}`,sh.start?`🕐 ${sh.start} – ${sh.end}`:"",sh.linea?`🚍 ${sh.linea}`:"",vets.length?`🚌 ${vets.map(v=>v.replace(/Vettura:\s*/,"")).join(", ")}`:"","📱 Operatore ANM"].filter(r=>r).join("\n");
    if(navigator.share&&navigator.canShare({text:txt}))navigator.share({text:txt}).catch(()=>navigator.clipboard?.writeText(txt).then(()=>fire("✓ Copiato!")));
    else navigator.clipboard?.writeText(txt).then(()=>fire("✓ Copiato negli appunti!"));
  }
  return (<div className="slide-up">
    <div className="ph">👥 Colleghi</div>
    <div className="ps">Rubrica e cambio turno rapido.</div>
    <div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",borderRadius:14,padding:"14px 16px",marginBottom:14}}>
      <div style={{fontSize:10,fontWeight:700,color:"#444",textTransform:"uppercase",letterSpacing:".6px",marginBottom:10}}>🔄 Invia cambio turno</div>
      <input type="date" value={cambioGiorno} onChange={e=>setCambioGiorno(e.target.value)} style={{width:"100%",background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.12)",borderRadius:9,padding:"10px 12px",color:"#E2E2F0",fontSize:14,fontFamily:"'JetBrains Mono',monospace",fontWeight:700,boxSizing:"border-box",outline:"none",marginBottom:10}}/>
      <div style={{position:"relative"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,background:"rgba(255,255,255,.06)",border:"1px solid "+(sel?"rgba(99,102,241,.5)":"rgba(255,255,255,.12)"),borderRadius:11,padding:"10px 14px"}}>
          {sel?<div style={{width:26,height:26,borderRadius:"50%",background:CLR[cl.findIndex(x=>x.id===sel.id)%CLR.length],display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:"white",flexShrink:0}}>{ini(sel.nome)}</div>:<span style={{fontSize:15,opacity:.4}}>👤</span>}
          <input value={q} onChange={e=>{setQ(e.target.value);setSel(null);setShowD(true);}} onFocus={()=>{if(q.trim())setShowD(true);}} placeholder="Cerca collega…" style={{flex:1,background:"none",border:"none",outline:"none",color:"#E2E2F0",fontFamily:"'Syne',sans-serif",fontSize:14,fontWeight:sel?700:400}}/>
          {q&&<button onClick={clear} style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:15,padding:0}}>✕</button>}
        </div>
        {showD&&sugg.length>0&&<div style={{position:"absolute",top:"calc(100% + 6px)",left:0,right:0,background:"#16162a",border:"1px solid rgba(99,102,241,.35)",borderRadius:12,zIndex:999,boxShadow:"0 8px 32px rgba(0,0,0,.6)",overflow:"hidden"}}>
          {sugg.map((c,i)=>{const t=getTipo(c.matricola);const tc=t==="ANM"?"#3B82F6":t==="INT"?"#F59E0B":"#666";const idx=cl.findIndex(x=>x.id===c.id);
            return <div key={c.id} onClick={()=>pick(c)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",cursor:"pointer",borderBottom:i<sugg.length-1?"1px solid rgba(255,255,255,.05)":"none"}} onMouseEnter={e=>e.currentTarget.style.background="rgba(99,102,241,.12)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <div style={{width:30,height:30,borderRadius:"50%",background:CLR[idx%CLR.length],display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:"white",flexShrink:0}}>{ini(c.nome)}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:700,color:"#E2E2F0"}}>{c.nome}</div>
                <div style={{display:"flex",gap:4,marginTop:1,alignItems:"center"}}>
                  <span style={{fontSize:10,color:"#555",fontFamily:"'JetBrains Mono',monospace"}}>{c.matricola}</span>
                  {t&&<span style={{fontSize:8,fontWeight:800,background:tc+"22",color:tc,border:"1px solid "+tc+"40",borderRadius:3,padding:"0 4px"}}>{t}</span>}
                </div>
              </div>
            </div>;})}
        </div>}
      </div>
      {sel&&<button onClick={()=>shareC(sel)} style={{width:"100%",marginTop:10,background:"linear-gradient(135deg,#FF6B35,#FF3CAC)",border:"none",color:"white",padding:"13px",borderRadius:12,cursor:"pointer",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        <span>📤</span><span>Invia a {sel.nome.split(" ")[0]}</span>
      </button>}
    </div>
    <div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",borderRadius:14,padding:"14px 16px"}}>
      <div style={{fontSize:10,fontWeight:700,color:"#444",textTransform:"uppercase",letterSpacing:".6px",marginBottom:10}}>📋 Rubrica ({cl.length})</div>
      <div style={{maxHeight:320,overflowY:"auto",borderRadius:10,border:"1px solid rgba(255,255,255,.06)"}}>
        {cl.map((c,i)=>{const t=getTipo(c.matricola);const tc=t==="ANM"?"#3B82F6":t==="INT"?"#F59E0B":"#666";
          return <div key={c.id} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 12px",borderBottom:"1px solid rgba(255,255,255,.04)"}}>
            <div style={{width:30,height:30,borderRadius:"50%",background:CLR[i%CLR.length],display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:"white",flexShrink:0}}>{ini(c.nome)}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:700,color:"#E2E2F0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.nome}</div>
              <div style={{display:"flex",alignItems:"center",gap:4,marginTop:1}}>
                {editId===c.id?<><input value={editMat} onChange={e=>setEditMat(e.target.value)} style={{width:65,background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,107,53,.4)",borderRadius:5,padding:"2px 6px",color:"#E2E2F0",fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:700,outline:"none"}}/><button onClick={()=>updMat(c.id,editMat)} style={{background:"rgba(16,185,129,.2)",border:"1px solid rgba(16,185,129,.4)",color:"#10B981",padding:"2px 6px",borderRadius:5,cursor:"pointer",fontSize:10,fontWeight:700}}>✓</button><button onClick={()=>setEditId(null)} style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:11,padding:0}}>✕</button></>
                :<><span style={{fontSize:10,color:"#555",fontFamily:"'JetBrains Mono',monospace"}}>{c.matricola}</span>{t&&<span style={{fontSize:8,fontWeight:800,background:tc+"20",color:tc,border:"1px solid "+tc+"35",borderRadius:3,padding:"0 3px"}}>{t}</span>}<button onClick={()=>{setEditId(c.id);setEditMat(c.matricola);}} style={{background:"none",border:"none",color:"#444",cursor:"pointer",fontSize:10,padding:"0 2px"}}>✏️</button></>}
              </div>
            </div>
            <button onClick={()=>removeC(c.id)} style={{background:"none",border:"none",color:"rgba(239,68,68,.4)",cursor:"pointer",fontSize:13,padding:"0 2px",flexShrink:0}}>✕</button>
          </div>;})}
      </div>
      <details style={{marginTop:10}}>
        <summary style={{fontSize:12,color:"#555",cursor:"pointer",fontWeight:700,padding:"6px 0",userSelect:"none"}}>➕ Aggiungi collega manualmente</summary>
        <div style={{display:"flex",gap:8,marginTop:8}}>
          <input id="cn-n" placeholder="Nome Cognome" style={{flex:2,background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,padding:"8px 10px",color:"#E2E2F0",fontFamily:"'Syne',sans-serif",fontSize:12,outline:"none"}}/>
          <input id="cn-m" placeholder="Matr." style={{flex:1,background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,padding:"8px 10px",color:"#E2E2F0",fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:700,outline:"none"}}/>
          <button onClick={()=>{const n=document.getElementById("cn-n")?.value||"",m=document.getElementById("cn-m")?.value||"";addC(n,m);if(document.getElementById("cn-n"))document.getElementById("cn-n").value="";if(document.getElementById("cn-m"))document.getElementById("cn-m").value="";}} style={{background:"rgba(99,102,241,.2)",border:"1px solid rgba(99,102,241,.4)",color:"#A5B4FC",padding:"8px 12px",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:800}}>+</button>
        </div>
      </details>
    </div>
  </div>);
}

// ─── STIPENDIO ────────────────────────────────────────────────────────────────
function StipendioCalc({st,yr,mo,allShifts}){
  const MESI=["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
  const [tar,setTar]=useState(()=>{try{const s=localStorage.getItem("anm_tar");if(s)return JSON.parse(s);}catch(e){}return{base:12.50,str:18.75,dom:15.00,fest:18.75,not:1.50};});
  const [showTar,setShowTar]=useState(false);
  function saveTar(t){try{localStorage.setItem("anm_tar",JSON.stringify(t));}catch(e){}setTar(t);}
  const fest=useMemo(()=>getFestivita(yr),[yr]);
  const c=useMemo(()=>{
    const pfx=`${yr}-${String(mo+1).padStart(2,"0")}`;
    let oO=0,oS=0,oD=0,oF=0,oN=0,gg=0;
    Object.entries(st.shifts).forEach(([key,val])=>{
      if(!key.startsWith(pfx))return;
      const sh=allShifts.find(x=>x.id===val.shiftId);if(!sh||!sh.start||!sh.end)return;
      gg++;const h=calcH(sh.start,sh.end);
      const d=parseInt(key.split("-")[2]),date=new Date(yr,mo,d),dow=(date.getDay()+6)%7;
      const iF=!!fest[key],iD=dow===6,iN=(parseInt(sh.start.split(":")[0])||0)>=22||(parseInt(sh.start.split(":")[0])||0)<6;
      if(iF)oF+=h;else if(iD)oD+=h;else if(h>8){oO+=8;oS+=(h-8);}else oO+=h;
      if(iN)oN+=h;
    });
    return{oO,oS,oD,oF,oN,gg,tot:(oO*tar.base)+(oS*tar.str)+(oD*tar.dom)+(oF*tar.fest)+(oN*tar.not)};
  },[st.shifts,yr,mo,allShifts,tar,fest]);
  return (<div className="slide-up">
    <div className="ph">💶 Stipendio</div>
    <div className="ps">{MESI[mo]} {yr} · Stima ore lavorate</div>
    <div style={{background:"linear-gradient(135deg,rgba(255,107,53,.12),rgba(255,60,172,.08))",border:"1px solid rgba(255,107,53,.25)",borderRadius:16,padding:"20px",marginBottom:14,textAlign:"center"}}>
      <div style={{fontSize:11,color:"#FF6B35",fontWeight:700,textTransform:"uppercase",letterSpacing:".8px",marginBottom:6}}>Stima lorda mensile</div>
      <div style={{fontSize:38,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:"#E2E2F0",letterSpacing:-2}}>€{c.tot.toFixed(2)}</div>
      <div style={{fontSize:11,color:"#555",marginTop:4}}>{c.gg} giorni lavorati</div>
    </div>
    <div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",borderRadius:12,padding:"14px 16px",marginBottom:14}}>
      <div style={{fontSize:10,fontWeight:700,color:"#444",textTransform:"uppercase",letterSpacing:".6px",marginBottom:12}}>Dettaglio ore</div>
      {[["⏱ Ordinarie",c.oO,tar.base,"#E2E2F0"],["⚡ Straordinari",c.oS,tar.str,"#F59E0B"],["☀️ Domenicali",c.oD,tar.dom,"#EC4899"],["🎉 Festivi",c.oF,tar.fest,"#8B5CF6"],["🌙 Notturno",c.oN,tar.not,"#6366F1"]].map(([lbl,ore,t,col])=>(
        ore>0&&<div key={lbl} style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
          <div><span style={{fontSize:13,fontWeight:600,color:col}}>{lbl}</span><span style={{fontSize:11,color:"#555",marginLeft:8}}>{ore.toFixed(1)}h × €{t.toFixed(2)}</span></div>
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,fontWeight:700,color:col}}>€{(ore*t).toFixed(2)}</span>
        </div>
      ))}
    </div>
    <div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",borderRadius:12,padding:"13px 15px",cursor:"pointer"}} onClick={()=>setShowTar(p=>!p)}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontSize:14,fontWeight:700,color:"#E2E2F0"}}>⚙️ Configura tariffe</div><div style={{fontSize:11,color:"#555",marginTop:2}}>Modifica valori CCNL</div></div>
        <span style={{color:"#555",opacity:.5}}>{showTar?"∨":"›"}</span>
      </div>
      {showTar&&<div style={{marginTop:12,display:"flex",flexDirection:"column",gap:10}}>
        {[["base","Ordinario €/h"],["str","Straordinario €/h"],["dom","Domenicale €/h"],["fest","Festivo €/h"],["not","Notturno extra €/h"]].map(([k,lbl])=>(
          <div key={k} style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
            <span style={{fontSize:13,color:"#aaa",flex:1}}>{lbl}</span>
            <input type="number" step="0.01" value={tar[k]} onChange={e=>saveTar({...tar,[k]:parseFloat(e.target.value)||0})} style={{width:75,background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.15)",borderRadius:8,padding:"6px 10px",color:"#E2E2F0",fontFamily:"'JetBrains Mono',monospace",fontSize:14,fontWeight:700,outline:"none",textAlign:"right"}}/>
          </div>
        ))}
        <div style={{fontSize:11,color:"#444",lineHeight:1.5}}>⚠️ Valori indicativi. Verifica sempre con il tuo cedolino.</div>
      </div>}
    </div>
  </div>);
}

// ─── LOGIN ────────────────────────────────────────────────────────────────────
function LoginApp({onLogin}){
  const [mode,setMode]=useState("login");
  const [mat,setMat]=useState(""); const [pwd,setPwd]=useState(""); const [err,setErr]=useState(""); const [busy,setBusy]=useState(false); const [rem,setRem]=useState(false);
  const [rN,setRN]=useState(""); const [rM,setRM]=useState(""); const [rD,setRD]=useState(""); const [rP,setRP]=useState(""); const [rP2,setRP2]=useState("");
  const [cM,setCM]=useState(""); const [cD,setCD]=useState(""); const [cP,setCP]=useState(""); const [cP2,setCP2]=useState(""); const [cOk,setCOk]=useState(false);
  const [fN,setFN]=useState(""); const [fD,setFD]=useState(""); const [fR,setFR]=useState(null);
  useEffect(()=>{try{const s=localStorage.getItem("anm_remember");if(s){const r=JSON.parse(s);if(r.mat)setMat(r.mat);if(r.pwd)setPwd(r.pwd);setRem(true);}}catch(e){};},[]);
  function go(m){setMode(m);setErr("");}
  async function doLogin(){
    if(!mat.trim()||!pwd.trim()){setErr("Inserisci matricola e password");return;}
    setBusy(true);setErr("");
    const accs=getAccounts(),acc=accs[mat.trim()];
    if(!acc){setErr("Matricola non trovata — registrati");setBusy(false);return;}
    if(await sha256(pwd)!==acc.pwdHash){setErr("Password errata");setBusy(false);return;}
    if(rem)try{localStorage.setItem("anm_remember",JSON.stringify({mat:mat.trim(),pwd}));}catch(e){}
    else try{localStorage.removeItem("anm_remember");}catch(e){}
    setSession(mat.trim());logAccess(mat.trim(),acc.nome);onLogin(mat.trim());setBusy(false);
  }
  async function doReg(){
    if(!rN.trim()||!rM.trim()||!rD||!rP||!rP2){setErr("Compila tutti i campi");return;}
    if(rP!==rP2){setErr("Password non coincidono");return;}
    if(rP.length<4){setErr("Min. 4 caratteri");return;}
    setBusy(true);setErr("");
    const accs=getAccounts();
    if(accs[rM.trim()]){setErr("Matricola già registrata");setBusy(false);return;}
    const h=await sha256(rP);
    accs[rM.trim()]={pwdHash:h,dob:rD,nome:rN.trim(),isAdmin:false,createdAt:Date.now()};
    setAccounts(accs);setSession(rM.trim());logAccess(rM.trim(),rN.trim());onLogin(rM.trim());setBusy(false);
  }
  async function doRec(){
    if(!cM.trim()||!cD||!cP||!cP2){setErr("Compila tutti i campi");return;}
    if(cP!==cP2){setErr("Password non coincidono");return;}
    if(cP.length<4){setErr("Min. 4 caratteri");return;}
    setBusy(true);setErr("");
    const accs=getAccounts(),acc=accs[cM.trim()];
    if(!acc){setErr("Matricola non trovata");setBusy(false);return;}
    if(acc.dob!==cD){setErr("Data di nascita errata");setBusy(false);return;}
    accs[cM.trim()]={...acc,pwdHash:await sha256(cP)};setAccounts(accs);
    setCOk(true);setBusy(false);
  }
  function cercaM(){
    if(!fN.trim()||!fD){setErr("Inserisci nome e data");return;}
    const found=Object.entries(getAccounts()).find(([m,a])=>a.nome&&a.nome.toLowerCase()===fN.trim().toLowerCase()&&a.dob===fD);
    if(found){setFR(found[0]);setErr("");}else{setErr("Account non trovato");setFR(null);}
  }
  const tipoM=rM.length>=5?getTipo(rM):"";
  const tc=tipoM==="ANM"?"#3B82F6":tipoM==="INT"?"#F59E0B":"transparent";
  const Hdr=()=><div className="ls-hdr"><ANMLogo size={26}/><span className="ls-hdr-r">INTRANET</span></div>;
  const Ftr=()=><div className="ls-ftr"><span className="ls-ftr-t">Powered by ANM spa · ICT · Mobile</span></div>;

  if(mode==="reg") return (<div className="ls"><Hdr/><div className="ls-body"><div className="ls-card">
    <div className="ls-tit">Registrazione</div>
    <label className="ls-lbl">Nome e cognome</label><input className="ls-inp" value={rN} onChange={e=>{setRN(e.target.value);setErr("");}} style={{fontFamily:"Arial,sans-serif"}} placeholder="Mario Rossi"/>
    <label className="ls-lbl">Matricola {tipoM&&<span style={{fontSize:9,background:tc+"22",color:tc,border:"1px solid "+tc+"44",borderRadius:3,padding:"0 5px",marginLeft:4}}>{tipoM}</span>}</label><input className="ls-inp" value={rM} onChange={e=>{setRM(e.target.value.replace(/\D/g,""));setErr("");}} inputMode="numeric" maxLength={8}/>
    <label className="ls-lbl">Data di nascita (per recupero)</label><input className="ls-inp" type="date" value={rD} onChange={e=>{setRD(e.target.value);setErr("");}} style={{fontFamily:"Arial,sans-serif"}}/>
    <label className="ls-lbl">Password</label><input className="ls-inp" type="password" placeholder="Min. 4 caratteri" value={rP} onChange={e=>{setRP(e.target.value);setErr("");}}/>
    <label className="ls-lbl">Conferma password</label><input className={"ls-inp"+(rP2&&rP2!==rP?" er":"")} type="password" placeholder="Ripeti" value={rP2} onChange={e=>{setRP2(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&doReg()}/>
    {err&&<div className="ls-err">{err}</div>}
    <div className="ls-row"><button className="ls-btn" onClick={doReg} disabled={busy}>{busy?"Attendere…":"Registra"}</button><button className="ls-btn2" onClick={()=>go("login")}>Annulla</button></div>
    <button className="ls-lnk" onClick={()=>go("login")}>← Torna al login</button>
  </div></div><Ftr/></div>);

  if(mode==="rec") return (<div className="ls"><Hdr/><div className="ls-body"><div className="ls-card">
    {cOk?<><div className="ls-tit">Password aggiornata</div><div style={{fontSize:13,color:"#007700",fontWeight:600,marginBottom:16}}>✅ Ora puoi accedere con la nuova password.</div><button className="ls-btn" onClick={()=>{go("login");setCOk(false);setCM("");setCD("");setCP("");setCP2("");}}>Vai al login</button></> 
    :<><div className="ls-tit">Recupera password</div>
    <label className="ls-lbl">Matricola</label><input className="ls-inp" value={cM} onChange={e=>{setCM(e.target.value.replace(/\D/g,""));setErr("");}} inputMode="numeric" maxLength={8}/>
    <label className="ls-lbl">Data di nascita</label><input className="ls-inp" type="date" value={cD} onChange={e=>{setCD(e.target.value);setErr("");}} style={{fontFamily:"Arial,sans-serif"}}/>
    <label className="ls-lbl">Nuova password</label><input className="ls-inp" type="password" value={cP} onChange={e=>{setCP(e.target.value);setErr("");}}/>
    <label className="ls-lbl">Conferma</label><input className={"ls-inp"+(cP2&&cP2!==cP?" er":"")} type="password" value={cP2} onChange={e=>{setCP2(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&doRec()}/>
    {err&&<div className="ls-err">{err}</div>}
    <div className="ls-row"><button className="ls-btn" onClick={doRec} disabled={busy}>{busy?"Verifica…":"Reimposta"}</button><button className="ls-btn2" onClick={()=>go("login")}>Annulla</button></div>
    <button className="ls-lnk" onClick={()=>go("login")}>← Torna al login</button></>}
  </div></div><Ftr/></div>);

  if(mode==="find") return (<div className="ls"><Hdr/><div className="ls-body"><div className="ls-card">
    <div className="ls-tit">Recupera matricola</div>
    {fR?<><div style={{background:"#f0fff0",border:"1px solid #007700",padding:"14px",marginBottom:14}}><div style={{fontSize:12,color:"#007700",fontWeight:700,marginBottom:6}}>✅ Trovato!</div><div style={{fontSize:13,color:"#222"}}>La tua matricola è:</div><div style={{fontSize:28,fontWeight:900,color:"#1a1f8c",fontFamily:"Courier New,monospace",letterSpacing:2,marginTop:4}}>{fR}</div></div>
    <div className="ls-row"><button className="ls-btn" onClick={()=>{go("login");setFR(null);setFN("");setFD("");}}>Vai al login</button><button className="ls-btn2" onClick={()=>go("rec")}>Reset password</button></div></>
    :<><div style={{fontSize:12,color:"#555",fontFamily:"Arial,sans-serif",marginBottom:14,lineHeight:1.5}}>Inserisci il nome usato alla registrazione e la data di nascita.</div>
    <label className="ls-lbl">Nome e cognome</label><input className="ls-inp" value={fN} onChange={e=>{setFN(e.target.value);setErr("");}} style={{fontFamily:"Arial,sans-serif"}}/>
    <label className="ls-lbl">Data di nascita</label><input className="ls-inp" type="date" value={fD} onChange={e=>{setFD(e.target.value);setErr("");}} style={{fontFamily:"Arial,sans-serif"}} onKeyDown={e=>e.key==="Enter"&&cercaM()}/>
    {err&&<div className="ls-err">{err}</div>}
    <div className="ls-row"><button className="ls-btn" onClick={cercaM}>Cerca</button><button className="ls-btn2" onClick={()=>go("login")}>Annulla</button></div>
    <button className="ls-lnk" onClick={()=>go("login")}>← Torna al login</button></>}
  </div></div><Ftr/></div>);

  return (<div className="ls"><Hdr/><div className="ls-body"><div className="ls-card">
    <div className="ls-tit">Accesso all'app operatori</div>
    <label className="ls-lbl">Matricola</label>
    <input className="ls-inp" value={mat} onChange={e=>{setMat(e.target.value.replace(/\D/g,""));setErr("");}} onKeyDown={e=>e.key==="Enter"&&doLogin()} inputMode="numeric" maxLength={8} autoComplete="username" autoFocus/>
    <label className="ls-lbl">Password</label>
    <input className="ls-inp" type="password" value={pwd} onChange={e=>{setPwd(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&doLogin()} autoComplete="current-password"/>
    {err&&<div className="ls-err">{err}</div>}
    <label className="ls-rem"><input type="checkbox" checked={rem} onChange={e=>setRem(e.target.checked)}/><span>Ricorda su questo dispositivo</span></label>
    <div className="ls-row"><button className="ls-btn" onClick={doLogin} disabled={busy}>{busy?"Accesso…":"Invia"}</button><button className="ls-btn2" onClick={()=>{setMat("");setPwd("");setErr("");setRem(false);try{localStorage.removeItem("anm_remember");}catch(e){};}}>Annulla</button></div>
    <hr className="ls-sep"/>
    <button className="ls-lnk" onClick={()=>go("reg")}>Primo accesso? Registrati</button>
    <button className="ls-lnk" onClick={()=>go("rec")}>🔑 Password dimenticata</button>
    <button className="ls-lnk" onClick={()=>go("find")}>👤 Matricola dimenticata</button>
  </div></div><Ftr/></div>);
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function AppRoot(){
  const [utente,setUtente]     = useState(()=>getSession());
  const [darkMode,setDarkMode] = useState(()=>{try{const s=localStorage.getItem("anm_theme");if(s)return s==="dark";}catch(e){}return window.matchMedia("(prefers-color-scheme:dark)").matches;});
  const [pinLocked,setPinLocked] = useState(false);
  const [avviso,setAvviso]       = useState("");
  const [showAvv,setShowAvv]     = useState(false);
  const lastAct = useRef(Date.now());

  function toggleTheme(){setDarkMode(d=>{const n=!d;try{localStorage.setItem("anm_theme",n?"dark":"light");}catch(e){}return n;});}

  useEffect(()=>{
    const pin=()=>{try{return localStorage.getItem("anm_pin")||"";}catch(e){return "";}};
    const chk=()=>{if(!pin())return;if(Date.now()-lastAct.current>5*60*1000)setPinLocked(true);};
    const touch=()=>{lastAct.current=Date.now();};
    const iv=setInterval(chk,30000);
    ["touchstart","click","keydown"].forEach(ev=>window.addEventListener(ev,touch));
    return()=>{clearInterval(iv);["touchstart","click","keydown"].forEach(ev=>window.removeEventListener(ev,touch));};
  },[]);

  useEffect(()=>{
    if(!utente)return;
    try{const a=localStorage.getItem("anm_avviso"),seen=localStorage.getItem("anm_avviso_seen");if(a&&a!==seen){setAvviso(a);setShowAvv(true);}}catch(e){}
  },[utente]);

  function dismissAvv(){try{localStorage.setItem("anm_avviso_seen",avviso);}catch(e){}setShowAvv(false);}

  if(!utente) return <LoginApp onLogin={m=>{setUtente(m);setSession(m);}}/>;
  if(pinLocked) return <PinScreen onUnlock={()=>{setPinLocked(false);lastAct.current=Date.now();}}/>;

  return (<>
    {showAvv&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:8500,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#0e0e1e",border:"1px solid rgba(255,107,53,.4)",borderRadius:20,padding:24,maxWidth:340,width:"100%"}}>
        <div style={{fontSize:10,fontWeight:800,color:"#FF6B35",textTransform:"uppercase",letterSpacing:".8px",marginBottom:10}}>📢 Comunicazione dal responsabile</div>
        <div style={{fontSize:15,color:"#E2E2F0",lineHeight:1.6,marginBottom:20}}>{avviso}</div>
        <button onClick={dismissAvv} style={{width:"100%",background:"linear-gradient(135deg,#FF6B35,#FF3CAC)",border:"none",color:"white",padding:"13px",borderRadius:11,cursor:"pointer",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:14}}>Ho letto ✓</button>
      </div>
    </div>}
    <ANMOperator utente={utente} darkMode={darkMode} toggleTheme={toggleTheme} onLogout={()=>{setSession(null);setUtente(null);try{localStorage.removeItem("anm_remember");}catch(e){}}}/>
  </>);
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(AppRoot));
</script>

<script>
// Carica e trasforma il JSX in modo lazy dopo il DOM
window.addEventListener('load', function() {
  var src = document.getElementById('app-src').textContent;
  var transformed;
  try {
    transformed = Babel.transform(src, {
      presets: ['react'],
      plugins: []
    }).code;
  } catch(e) {
    document.getElementById('root').innerHTML =
      '<div style="color:red;padding:20px;font-family:monospace">Errore: ' + e.message + '</div>';
    return;
  }
  var s = document.createElement('script');
  s.textContent = transformed;
  document.body.appendChild(s);
});
